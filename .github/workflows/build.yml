name: Build SDM660 Kernel (Fixed)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build (e.g., r9/hmp)"
        required: true
        default: "r9/hmp"
      oc_gpu:
        description: "Enable GPU OC 700MHz?"
        required: true
        default: "true"
      defconfig:
        description: "Defconfig file"
        required: true
        default: "sdm660-perf_defconfig"

env:
  ARCH: arm64
  SUBARCH: arm64

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/swift
          sudo apt-get clean
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential curl flex git gnupg gperf \
            libelf-dev libncurses5-dev libssl-dev lz4 \
            squashfs-tools xsltproc zip zlib1g-dev zstd \
            python3 python3-pip \
            clang llvm lld \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi
          clang --version
          aarch64-linux-gnu-gcc --version

      - name: Checkout kernel source (shallow)
        uses: actions/checkout@v4
        with:
          repository: RyuujiX/android_kernel_asus_sdm660
          ref: ${{ github.event.inputs.branch }}
          submodules: recursive
          fetch-depth: 1
          path: kernel

      - name: Grep GPU validation
        working-directory: kernel
        run: |
          echo "=== MAX_GPU_FREQ ==="
          grep -rn "MAX_GPU_FREQ" drivers/gpu/msm/ || echo "[INFO] Not found"
          echo ""
          echo "=== overclock_gpu ==="
          grep -rn "overclock_gpu" drivers/gpu/msm/ || echo "[INFO] Not found"
          echo ""
          echo "=== kgsl_pwrctrl.c gpu_freq ==="
          grep -n "gpu_freq" drivers/gpu/msm/kgsl_pwrctrl.c | head -20 || true

      - name: Patch adreno.c overclock_gpu
        if: github.event.inputs.oc_gpu == 'true'
        working-directory: kernel
        run: |
          ADRENO="drivers/gpu/msm/adreno.c"
          if grep -q "overclock_gpu" "$ADRENO"; then
            cp "$ADRENO" "$ADRENO.bak"
            sed -i 's/overclock_gpu\s*=\s*0/overclock_gpu = 1/g' "$ADRENO"
            sed -i 's/overclock_gpu\s*=\s*false/overclock_gpu = true/g' "$ADRENO"
            grep -n "overclock_gpu" "$ADRENO" | head -5
          else
            echo "[WARN] overclock_gpu not found in adreno.c"
          fi

      - name: Patch GPU DT speed bin 90
        if: github.event.inputs.oc_gpu == 'true'
        working-directory: kernel
        run: |
          DT="arch/arm64/boot/dts/qcom/sdm660-gpu.dtsi"
          if [ ! -f "$DT" ]; then
            DT=$(find arch/arm64/boot/dts/qcom/ -name "*gpu*" -type f | head -1)
          fi
          echo "[INFO] DT: $DT"
          cp "$DT" "$DT.bak"
          
          # NOTE: single quotes for grep to avoid < > being interpreted as shell redirection
          grep -n -A20 'qcom,speed-bin = <90>' "$DT" | head -30 || true
          
          cat > /tmp/patch_dt.py << 'PYEOF'
          import re
          import sys
          dt_file = sys.argv[1]
          with open(dt_file, 'r') as f:
              c = f.read()
          pos = c.find('qcom,speed-bin = <90>')
          if pos == -1:
              print('[WARN] speed-bin 90 not found')
              sys.exit(1)
          start = c.rfind('qcom,gpu-pwrlevels', 0, pos)
          end = c.find('};', pos)
          end = c.find('};', end + 1)
          block = c[start:end+2]
          block = block.replace('qcom,gpu-freq = <585000000>;', 'qcom,gpu-freq = <700000000>;')
          block = block.replace('qcom,gpu-freq = <588000000>;', 'qcom,gpu-freq = <700000000>;')
          c = c[:start] + block + c[end+2:]
          with open(dt_file, 'w') as f:
              f.write(c)
          print('[OK] Speed bin 90 patched to 700 MHz')
          PYEOF
          
          python3 /tmp/patch_dt.py "$DT"
          grep -n -A20 'qcom,speed-bin = <90>' "$DT" | head -30 || true

      - name: Patch gpucc clock driver
        if: github.event.inputs.oc_gpu == 'true'
        working-directory: kernel
        run: |
          CLK="drivers/clk/qcom/gpucc-sdm660.c"
          if [ ! -f "$CLK" ]; then
            CLK=$(find drivers/clk/qcom/ -name "*gpu*660*" -type f | head -1)
          fi
          echo "[INFO] CLK: $CLK"
          cp "$CLK" "$CLK.bak"
          if grep -q "700000000" "$CLK"; then
            echo "[INFO] 700 MHz already present"
          else
            cat > /tmp/patch_clk.py << 'PYEOF'
            import re
            import sys
            clk_file = sys.argv[1]
            with open(clk_file, 'r') as f:
                c = f.read()
            if '700000000' in c:
                print('[INFO] Already has 700 MHz')
                sys.exit(0)
            m = re.search(r'(F_GFX\(647000000,.*?\),)', c)
            if m:
                ins = m.end()
                new = '\n\tF_GFX(700000000, 0,  2, 0, 0, 1170000000),\n\tF_GFX(750000000, 0,  2, 0, 0, 1170000000),'
                c = c[:ins] + new + c[ins:]
                print('[OK] Inserted 700/750 MHz')
            else:
                m2 = re.search(r'(F_GFX\(588000000,.*?\),)', c)
                if m2:
                    ins = m2.end()
                    new = '\n\tF_GFX(647000000, 0,  2, 0, 0,  930000000),\n\tF_GFX(700000000, 0,  2, 0, 0, 1170000000),\n\tF_GFX(750000000, 0,  2, 0, 0, 1170000000),'
                    c = c[:ins] + new + c[ins:]
                    print('[OK] Inserted 647/700/750 MHz')
                else:
                    print('[WARN] Anchor not found')
            with open(clk_file, 'w') as f:
                f.write(c)
            PYEOF
            python3 /tmp/patch_clk.py "$CLK"
          fi
          grep -n "700000000" "$CLK" || echo "[WARN] 700 MHz not found!"

      - name: Build kernel
        working-directory: kernel
        run: |
          export CC="clang"
          export CXX="clang++"
          export CROSS_COMPILE="aarch
